---
- name: Test - thirty tasks via loop, all coverage-skipped
  hosts: localhost
  gather_facts: false
  vars:
    var1: v1
  tasks:
    - name: Apply templates (coverage_skip)
      ansible.builtin.template:
        src: dummy.conf.j2
        dest: "./dummy{{ item }}.conf"
        mode: "0644"
      loop: "{{ range(0, 31) | list }}"
