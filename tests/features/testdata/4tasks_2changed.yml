---
- name: Test - four tasks, two changed
  hosts: localhost
  gather_facts: false
  vars:
    var1: v1
  tasks:
    - name: Render first template
      ansible.builtin.template:
        src: dummy.conf.j2
        dest: ./dummy1.conf
        mode: "0644"

    - name: Render second template
      ansible.builtin.template:
        src: dummy.conf.j2
        dest: ./dummy2.conf
        mode: "0644"

    - name: Task to be not-changed
      ansible.builtin.template:
        src: dummy.conf.j2
        dest: ./dummy2.conf
        mode: "0644"

    - name: Task to be skipped
      ansible.builtin.ping:
      when: false
