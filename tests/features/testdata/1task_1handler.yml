---
- name: Test - one task with handler
  hosts: localhost
  gather_facts: false
  vars:
    var1: v1
  tasks:
    - name: Render main template
      ansible.builtin.template:
        src: dummy.conf.j2
        dest: ./dummy1.conf
        mode: "0644"
      notify:
        - Render secondary template
  handlers:
    - name: Render secondary template
      ansible.builtin.template:
        src: dummy.conf.j2
        dest: ./dummy_no_serverspec_test.conf
        mode: "0644"
