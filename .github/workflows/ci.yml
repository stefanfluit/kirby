name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    container:
      image: python:3.15.0b3-slim

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends libffi-dev

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Run unit tests
        run: pytest

  ansible-lint:
    runs-on: ubuntu-latest
    container:
      image: python:3.12-slim

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends libffi-dev

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Run ansible-lint
        run: ansible-lint -c ansible-lint.yaml

  integration:
    runs-on: ubuntu-latest
    container:
      image: python:3.15.0b3-slim

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            libffi-dev ruby ruby-bundler ruby-dev build-essential

      - name: Install Python packages
        run: pip install -e . ansible-core behave

      - name: Install Ruby gems for examples
        working-directory: examples
        run: bundle install

      - name: Install Ruby gems for testdata
        working-directory: tests/features/testdata
        run: bundle install

      - name: Run example playbook
        working-directory: examples
        run: |
          ansible-playbook create_files.yml -i inventory 2>&1 | tee /tmp/kirby_output.txt
          grep -q "Kirby Results" /tmp/kirby_output.txt
          grep -q "Coverage" /tmp/kirby_output.txt
          grep -q "Create world.txt" /tmp/kirby_output.txt

      - name: Run BDD tests
        run: behave tests/features/ --no-source

  compat:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ansible-core-version:
          - "2.16.*"
          - "2.17.*"
          - "2.18.*"
    container:
      image: python:3.12-slim

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            libffi-dev ruby ruby-bundler ruby-dev build-essential

      - name: Install ansible-core ${{ matrix.ansible-core-version }}
        run: pip install -e . "ansible-core==${{ matrix.ansible-core-version }}"

      - name: Install Ruby gems
        working-directory: examples
        run: bundle install

      - name: Run example playbook
        working-directory: examples
        run: |
          ansible-playbook create_files.yml -i inventory 2>&1 | tee /tmp/kirby_output.txt
          grep -q "Kirby Results" /tmp/kirby_output.txt
          grep -q "Coverage" /tmp/kirby_output.txt
